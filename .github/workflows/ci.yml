name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  migration-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if a merged migration was modified
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          # List migration files that were Modified (not Added) in the PR diff
          MODIFIED=$(git diff --diff-filter=M --name-only "$BASE"...HEAD -- 'apps/api/src/db/migrations/')
          if [ -n "$MODIFIED" ]; then
            echo "::error::Merged migrations must not be modified. Only add new ones."
            echo "$MODIFIED"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: butterbook_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/butterbook_test
      TOTP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_SECRET: test_session_secret_must_be_at_least_32_chars
      KIOSK_NONCE_SECRET: test_kiosk_secret_must_be_at_least_32_chars
      APP_BASE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter api migrate up
      - run: pnpm test
